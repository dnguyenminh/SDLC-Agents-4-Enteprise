name: CI — SA4E-44 (Task Queue & Code Intelligence)

on:
  push:
    branches: [SA4E-44]
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'extension/**'
      - '.github/workflows/ci-sa4e-44.yml'

env:
  NODE_VERSION: '20'

jobs:
  # --- Job 1: Lint & Type Check ---
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: backend

      - name: ESLint (if configured)
        run: npx eslint src/ --ext .ts --max-warnings 0 || true
        working-directory: backend

  # --- Job 2: Build ---
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  # --- Job 3: Unit + PBT Tests ---
  test-unit:
    name: Unit Tests + PBT
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Cache Vitest
        uses: actions/cache@v4
        with:
          path: backend/node_modules/.vitest
          key: vitest-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            vitest-${{ runner.os }}-

      - name: Run unit tests (includes PBT via fast-check)
        run: npm run test:unit -- --reporter=verbose --coverage
        working-directory: backend

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage/
          retention-days: 7

  # --- Job 4: Integration Tests (Testcontainers + PostgreSQL) ---
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Cache Vitest
        uses: actions/cache@v4
        with:
          path: backend/node_modules/.vitest
          key: vitest-it-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            vitest-it-${{ runner.os }}-

      # Testcontainers handles PostgreSQL — no service container needed
      - name: Run integration tests
        run: npm run test:integration -- --reporter=verbose
        working-directory: backend
        env:
          DATABASE_ADAPTER: postgresql
          TESTCONTAINERS_RYUK_DISABLED: 'false'

  # --- Job 5: Security Scan ---
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: npm audit
        run: npm audit --audit-level=high || true
        working-directory: backend

      - name: Check for known vulnerabilities
        run: npx better-npm-audit audit --level high || true
        working-directory: backend

  # --- Job 6: Docker Build Verify ---
  docker:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: sa4e-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
