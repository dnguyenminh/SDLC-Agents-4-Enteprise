<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#4facfe"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Orbital rings -->
  <ellipse cx="64" cy="64" rx="44" ry="18" transform="rotate(-30 64 64)" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="64" cy="64" rx="44" ry="18" transform="rotate(30 64 64)" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="64" cy="64" rx="44" ry="18" transform="rotate(90 64 64)" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.6"/>
  <!-- Central core (SM) -->
  <circle cx="64" cy="64" r="14" fill="url(#core)" opacity="0.95"/>
  <!-- Agent nodes (9 agents) -->
  <circle cx="28" cy="44" r="7" fill="url(#node)" opacity="0.9"/>
  <circle cx="100" cy="44" r="7" fill="url(#node)" opacity="0.9"/>
  <circle cx="28" cy="84" r="7" fill="url(#node)" opacity="0.9"/>
  <circle cx="100" cy="84" r="7" fill="url(#node)" opacity="0.9"/>
  <circle cx="64" cy="22" r="7" fill="url(#node)" opacity="0.9"/>
  <circle cx="64" cy="106" r="7" fill="url(#node)" opacity="0.9"/>
  <circle cx="40" cy="100" r="5.5" fill="url(#node)" opacity="0.7"/>
  <circle cx="88" cy="100" r="5.5" fill="url(#node)" opacity="0.7"/>
  <circle cx="44" cy="28" r="5.5" fill="url(#node)" opacity="0.7"/>
  <!-- Text -->
  <text x="64" y="69" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">SA4E</text>
</svg>
