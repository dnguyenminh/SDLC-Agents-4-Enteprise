<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Transparent background: only the atom shape is opaque so VS Code masks it into an atom silhouette -->
  <g fill="none" stroke="#000000" stroke-width="1.35">
    <ellipse cx="12" cy="12" rx="10" ry="4.2"/>
    <ellipse cx="12" cy="12" rx="10" ry="4.2" transform="rotate(60 12 12)"/>
    <ellipse cx="12" cy="12" rx="10" ry="4.2" transform="rotate(120 12 12)"/>
  </g>
  <!-- Nucleus -->
  <circle cx="12" cy="12" r="2.6" fill="#000000"/>
  <!-- Electrons on the three orbits -->
  <circle cx="22" cy="12" r="1.5" fill="#000000"/>
  <circle cx="7" cy="3.34" r="1.5" fill="#000000"/>
  <circle cx="7" cy="20.66" r="1.5" fill="#000000"/>
</svg>
