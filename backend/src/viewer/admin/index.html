  <style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b}.app{display:flex;min-height:100vh}.sidebar{width:240px;background:#1e293b;color:#e2e8f0;padding:16px 0;position:fixed;height:100vh;overflow-y:auto}.sidebar h1{font-size:14px;padding:0 16px 16px;color:#94a3b8;border-bottom:1px solid #334155;margin-bottom:8px}.sidebar h1 span{display:block;font-size:18px;color:#fff;margin-top:4px}.nav-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;transition:background .15s}.nav-item:hover{background:#334155}.nav-item.active{background:#3b82f6;color:#fff}.nav-item .icon{width:18px;text-align:center}.main{margin-left:240px;flex:1;padding:24px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.header h2{font-size:24px;font-weight:600}.card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:16px}.card h3{font-size:14px;color:#64748b;margin-bottom:8px}.card .value{font-size:28px;font-weight:700;color:#1e293b}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:14px}th{background:#f1f5f9;font-weight:600;color:#475569}tr:hover td{background:#f8fafc}tr.expanded-row td{background:#eff6ff}.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:500}.badge-green{background:#dcfce7;color:#166534}.badge-red{background:#fee2e2;color:#991b1b}.badge-yellow{background:#fef3c7;color:#92400e}.badge-blue{background:#dbeafe;color:#1e40af}.badge-purple{background:#f3e8ff;color:#6b21a8}.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s}.btn:hover{opacity:.85}.btn-primary{background:#3b82f6;color:#fff}.btn-danger{background:#ef4444;color:#fff}.btn-success{background:#22c55e;color:#fff}.btn-outline{background:transparent;border:1px solid #cbd5e1;color:#475569}.btn-sm{padding:4px 10px;font-size:12px}.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1e293b}.login-box{background:#fff;padding:40px;border-radius:12px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.2)}.login-box h2{margin-bottom:24px;text-align:center}.input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;margin-bottom:12px}.input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}.filter-input{padding:6px 10px;border:1px solid #cbd5e1;border-radius:4px;font-size:13px;margin-bottom:8px;width:260px}.expand-btn{cursor:pointer;-webkit-user-select:none;user-select:none;font-size:13px;width:24px;display:inline-block;text-align:center}.sub-table{margin:4px 12px 12px 40px;background:#fff;border-radius:6px;border:1px solid #e2e8f0}.sub-table th{background:#f8fafc;font-size:13px}.sub-table td{font-size:13px}.perm-check{display:flex;flex-wrap:wrap;gap:8px}.perm-check label{display:flex;align-items:center;gap:4px;font-size:13px;padding:2px 6px;background:#f1f5f9;border-radius:4px;cursor:pointer}.locked{opacity:.5;pointer-events:none}.rule-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f1f5f9}.rule-row:last-child{border-bottom:none}.rule-label{min-width:200px;font-size:13px;color:#475569}.mcp-detail{margin:8px 0 8px 24px;padding:12px;border:1px solid #e2e8f0;border-radius:6px;background:#fafbfc}.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}.toggle-switch{position:relative;display:inline-block;width:36px;height:20px}.toggle-switch input{opacity:0;width:0;height:0}.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:20px;transition:.2s}.toggle-slider:before{content:'';position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}.toggle-switch input:checked+.toggle-slider{background:#22c55e}.toggle-switch input:checked+.toggle-slider:before{transform:translateX(16px)}.log-line{font-family:monospace;font-size:12px;padding:2px 8px;border-bottom:1px solid #334155}.log-line .ts{color:#94a3b8;margin-right:8px}.log-line .lvl-INFO{color:#60a5fa}.log-line .lvl-DEBUG{color:#9ca3af}.log-line .lvl-ERROR{color:#f87171}.log-line .lvl-WARN{color:#fbbf24}.tab-bar{display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:16px}.tab{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px}.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}.score-bar{height:6px;border-radius:3px;background:#e2e8f0;margin-top:2px}.score-fill{height:100%;border-radius:3px}.md-content h1,.md-content h2,.md-content h3{font-size:13px;font-weight:600;margin:6px 0 4px;color:#e2e8f0}.md-content p{margin:4px 0}.md-content table{border-collapse:collapse;width:100%;font-size:11px;margin:6px 0}.md-content th,.md-content td{border:1px solid #475569;padding:3px 6px;text-align:left}.md-content th{background:#334155}.md-content code{background:#334155;padding:1px 4px;border-radius:3px;font-size:11px}.md-content pre{background:#1e293b;padding:8px;border-radius:4px;overflow-x:auto;font-size:11px}.md-content ul,.md-content ol{padding-left:16px;margin:4px 0}.md-content li{margin:2px 0}
  </style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/@babel/standalone@7.17.12/babel.min.js"></script>
<script type="text/babel">const{useState,useEffect,useCallback,useRef}=React;
const API='/api/admin';
const __urlParams=new URLSearchParams(window.location.search);
const __projectId=__urlParams.get('projectId')||'';
let __impersonateUserId=null;
function api(path,options={}){const token=localStorage.getItem('admin_token')||'';if(!token&&!path.includes('/auth/')){return Promise.resolve(null);}const impHeaders=__impersonateUserId?{'X-Impersonate':__impersonateUserId}:{};const projectHeaders=__projectId?{'X-Project-Id':__projectId}:{};const sep=path.includes('?')?'&':'?';const urlWithProject=__projectId?path+sep+'projectId='+encodeURIComponent(__projectId):path;return fetch(API+urlWithProject,{...options,headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json',...impHeaders,...projectHeaders,...options.headers}}).then(r=>{if(r.status===401){localStorage.removeItem('admin_token');localStorage.removeItem('admin_user');if(window.__onAuthExpired)window.__onAuthExpired();return null;}if(r.status===403){return r.json().then(d=>{showForbidden(d.error||'Access denied');return{__error:true,...d};}).catch(()=>({__error:true,error:'Forbidden'}));}if(!r.ok)return r.json().then(d=>({__error:true,...d})).catch(()=>null);return r.json();}).catch(()=>null);}

let __lastForbiddenMsg='';function showForbidden(msg){__lastForbiddenMsg=msg;setTimeout(()=>{__lastForbiddenMsg='';},3000);}
function exportCSV(data,filename){if(!data||data.length===0)return;const keys=Object.keys(data[0]);const csv=[keys.join(','),...data.map(row=>keys.map(k=>{const v=row[k];const s=v==null?'':String(v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;}).join(','))].join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}

const RULES={DASHBOARD_VIEW:[{name:'exportAllowed',type:'boolean',allowed:[true,false],default:false,desc:'Allow exporting'}],KB_READ:[{name:'allowedTiers',type:'enum[]',allowed:['USER','PROJECT','SHARED'],default:['USER','PROJECT','SHARED'],desc:'Tiers'}],KB_WRITE:[{name:'allowedTiers',type:'enum[]',allowed:['USER','PROJECT','SHARED'],default:['USER'],desc:'Write tiers'},{name:'maxEntries',type:'number',min:1,max:100000,default:1000,desc:'Max'},{name:'allowedOperations',type:'enum[]',allowed:['CREATE','UPDATE','DELETE'],default:['CREATE','UPDATE'],desc:'Ops'}],KB_PROMOTE:[{name:'targetTiers',type:'enum[]',allowed:['PROJECT','SHARED'],default:['PROJECT'],desc:'Targets'}],KB_IMPORT_EXPORT:[{name:'allowedFormats',type:'enum[]',allowed:['JSON','CSV'],default:['JSON','CSV'],desc:'Formats'},{name:'allowImport',type:'boolean',allowed:[true,false],default:true,desc:'Import'},{name:'allowExport',type:'boolean',allowed:[true,false],default:true,desc:'Export'}],MCP_ACCESS:[{name:'toolAccess',type:'mcp-tool-access-table',default:{},desc:'Per-server tool access (which tools user can call)'}],MCP_MANAGE:[{name:'allowAdd',type:'boolean',allowed:[true,false],default:true,desc:'Add new servers'},{name:'serverPermissions',type:'mcp-server-table',default:{},desc:'Per-server permissions (Remove/Edit/Restart)'}],USER_MANAGE:[{name:'canDelete',type:'boolean',allowed:[true,false],default:false,desc:'Delete'},{name:'canForceLogout',type:'boolean',allowed:[true,false],default:false,desc:'Logout'},{name:'canDisable',type:'boolean',allowed:[true,false],default:true,desc:'Disable'}],RBAC_MANAGE:[{name:'canDeleteSystemGroups',type:'boolean',allowed:[true,false],default:false,locked:true,desc:'LOCKED'},{name:'canEditSystemPermissions',type:'boolean',allowed:[true,false],default:false,desc:'Edit'}],CONFIG_EDIT:[{name:'allowedSections',type:'enum[]',allowed:['server','embedding','llm','mcp-servers','kb','auth'],default:['server','embedding','llm'],desc:'Sections'},{name:'readOnly',type:'boolean',allowed:[true,false],default:true,desc:'ReadOnly'}],SEARCH_EXPLORE:[{name:'maxResults',type:'number',min:10,max:1000,default:100,desc:'Max'},{name:'allowDebugMode',type:'boolean',allowed:[true,false],default:false,desc:'Debug'}],AUDIT_VIEW:[{name:'exportAllowed',type:'boolean',allowed:[true,false],default:false,desc:'Export'},{name:'maxDaysVisible',type:'number',min:1,max:365,default:90,desc:'Days'}],GRAPH_VIEW:[{name:'exportAllowed',type:'boolean',allowed:[true,false],default:false,desc:'Export'},{name:'maxNodes',type:'number',min:50,max:5000,default:500,desc:'Nodes'}],ANALYTICS_VIEW:[{name:'exportAllowed',type:'boolean',allowed:[true,false],default:false,desc:'Export'},{name:'allowedMetrics',type:'enum[]',allowed:['quality-scores','embedding-space','usage-stats','health-monitor'],default:['quality-scores','usage-stats'],desc:'Metrics'}]};

function LoginPage({onLogin}){const[username,setUsername]=useState('');const[password,setPassword]=useState('');const[error,setError]=useState('');const[loading,setLoading]=useState(false);const handleLogin=async()=>{setError('');setLoading(true);const res=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const data=await res.json().catch(()=>null);setLoading(false);if(!res.ok||!data?.token){setError(data?.error||'Login failed');return;}localStorage.setItem('admin_token',data.token);localStorage.setItem('admin_user',JSON.stringify(data.user));onLogin();};return(<div className="login-container"><div className="login-box"><h2>Admin Portal</h2>{error&&<div style={{background:'#fee2e2',color:'#991b1b',padding:'8px 12px',borderRadius:6,marginBottom:12,fontSize:13}}>{error}</div>}<input className="input" placeholder="Username" value={username} onChange={e=>setUsername(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/><input className="input" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()}/><button className="btn btn-primary" style={{width:'100%'}} onClick={handleLogin} disabled={loading}>{loading?'Logging in...':'Login'}</button></div></div>);}

function DashboardPage(){const[stats,setStats]=useState({});const intervalRef=useRef(null);const load=()=>{api('/stats').then(d=>{if(d===null){if(intervalRef.current){clearInterval(intervalRef.current);intervalRef.current=null;}return;}setStats(d||{});});};useEffect(()=>{load();intervalRef.current=setInterval(load,30000);return()=>{if(intervalRef.current)clearInterval(intervalRef.current);};},[]);const activity=stats.recentActivity||[];return(<div><div className="header"><h2>Dashboard</h2></div><div className="grid"><div className="card"><h3>KB Entries</h3><div className="value">{(stats.kbEntries||0).toLocaleString()}</div></div><div className="card"><h3>Code Symbols</h3><div className="value">{(stats.codeSymbols||0).toLocaleString()}</div></div><div className="card"><h3>Graph Nodes</h3><div className="value">{(stats.graphTotalNodes||0).toLocaleString()}</div><div style={{fontSize:11,color:'#64748b',marginTop:4}}>{(stats.graphKbNodes||0).toLocaleString()} KB + {(stats.graphCodeNodes||0).toLocaleString()} Code</div></div>{stats.users!==undefined&&<div className="card"><h3>Users</h3><div className="value">{stats.users}</div></div>}<div className="card"><h3>MCP Servers</h3><div className="value">{stats.mcpServers||0}</div></div><div className="card"><h3>Uptime</h3><div className="value" style={{fontSize:20}}>{stats.uptime?.formatted||'--'}</div></div><div className="card"><h3>Memory</h3><div className="value" style={{fontSize:16}}>{stats.memory?.formatted||'--'}</div></div></div><div className="card" style={{marginTop:16}}><h3 style={{marginBottom:12}}>Recent Activity</h3>{activity.length===0?<p style={{color:'#94a3b8',fontSize:13}}>No recent activity</p>:<table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Resource</th></tr></thead><tbody>{activity.map((a,i)=>(<tr key={i}><td style={{fontSize:12}}>{a.timestamp?new Date(a.timestamp).toLocaleString():'-'}</td><td>{a.username}</td><td><span className="badge badge-blue">{a.action}</span></td><td>{a.resource}{a.resourceId?' / '+a.resourceId:''}</td></tr>))}</tbody></table>}</div></div>);}

function KBManagementPage(){const[entries,setEntries]=useState([]);const[total,setTotal]=useState(0);const[page,setPage]=useState(1);const pageSize=20;const[sortBy,setSortBy]=useState('created_at');const[sortDir,setSortDir]=useState('desc');const[filter,setFilter]=useState('');const[tab,setTab]=useState('entries');const[promotions,setPromotions]=useState([]);const[importText,setImportText]=useState('');const[msg,setMsg]=useState('');const[tagEntry,setTagEntry]=useState(null);const[tagInput,setTagInput]=useState('');const[linkEntry,setLinkEntry]=useState(null);const[linkTarget,setLinkTarget]=useState('');
  const load=(p,sb,sd)=>{api('/kb/entries?page='+p+'&pageSize='+pageSize+'&sortBy='+sb+'&sortDir='+sd).then(d=>{if(d&&!d.__error){setEntries(d.entries||[]);setTotal(d.total||0);}});};
  const loadPromos=()=>{api('/kb/promotions').then(d=>{if(d&&!d.__error)setPromotions(d.promotions||[]);});};
  useEffect(()=>{load(page,sortBy,sortDir);loadPromos();},[page,sortBy,sortDir]);
  const totalPages=Math.ceil(total/pageSize);const toggleSort=(col)=>{if(sortBy===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortBy(col);setSortDir('desc');}setPage(1);};const sortIcon=(col)=>sortBy===col?(sortDir==='asc'?' ▲':' ▼'):'';
  const filtered=entries.filter(e=>!filter||JSON.stringify(e).toLowerCase().includes(filter.toLowerCase()));
  const doExport=()=>{api('/kb/export').then(d=>{if(d&&d.entries){const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='kb-export.json';a.click();URL.revokeObjectURL(url);setMsg('Exported '+d.count+' entries');}});};
  const doImport=()=>{try{const data=JSON.parse(importText);api('/kb/import',{method:'POST',body:JSON.stringify({entries:Array.isArray(data)?data:data.entries||[]})}).then(d=>{if(d&&!d.__error){setMsg(d.message);setImportText('');}else setMsg(d?.error||'Failed');});}catch{setMsg('Invalid JSON');}};
  const doExportCSV=()=>{exportCSV(entries.map(e=>({id:e.id||e.entry_id,source:e.source||e.title,tier:e.tier||e.scope,type:e.type||e.content_type,created:e.created_at})),'kb-entries.csv');};
  const saveTags=()=>{if(!tagEntry)return;api('/kb/entries/'+tagEntry+'/tags',{method:'POST',body:JSON.stringify({tags:tagInput.split(',').map(t=>t.trim()).filter(Boolean)})}).then(d=>{if(d&&!d.__error){setMsg('Tags saved');setTagEntry(null);}});};
  const saveLink=()=>{if(!linkEntry||!linkTarget)return;api('/kb/entries/'+linkEntry+'/link',{method:'POST',body:JSON.stringify({targetId:linkTarget,linkType:'related'})}).then(d=>{if(d&&!d.__error){setMsg('Link created');setLinkEntry(null);setLinkTarget('');}});};
  const reviewPromo=(id,action)=>{api('/kb/promotions/'+id+'/review',{method:'POST',body:JSON.stringify({action})}).then(()=>loadPromos());};
  return(<div><div className="header"><h2>KB Management</h2><div style={{display:'flex',gap:8}}><button className="btn btn-sm btn-outline" onClick={doExportCSV}>Export CSV</button><button className="btn btn-sm btn-outline" onClick={doExport}>Export JSON</button><span className="badge badge-blue" style={{fontSize:14,padding:'4px 12px'}}>{total} entries</span></div></div>
    {msg&&<div style={{position:'fixed',bottom:20,right:20,zIndex:9999,background:msg.startsWith('✗')||msg.startsWith('Failed')?'#fef2f2':'#f0fdf4',border:msg.startsWith('✗')||msg.startsWith('Failed')?'1px solid #fca5a5':'1px solid #86efac',padding:'12px 20px',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,0.15)',maxWidth:400,fontSize:13,display:'flex',alignItems:'center',gap:8}}><span>{msg}</span><button className="btn btn-sm btn-outline" style={{marginLeft:8,padding:'2px 6px'}} onClick={()=>setMsg('')}>✕</button></div>}
    <div className="tab-bar"><div className={'tab'+(tab==='entries'?' active':'')} onClick={()=>setTab('entries')}>Entries</div><div className={'tab'+(tab==='promotions'?' active':'')} onClick={()=>setTab('promotions')}>Promotions ({promotions.filter(p=>p.status==='pending').length})</div><div className={'tab'+(tab==='import'?' active':'')} onClick={()=>setTab('import')}>Import</div></div>
    {tab==='entries'&&<div className="card"><input className="filter-input" placeholder="Filter entries..." value={filter} onChange={e=>setFilter(e.target.value)}/>
      {tagEntry&&<div style={{padding:8,background:'#eff6ff',borderRadius:6,marginBottom:8}}>Tags for {tagEntry}: <input className="input" style={{width:300,display:'inline-block',marginBottom:0,marginLeft:8}} value={tagInput} onChange={e=>setTagInput(e.target.value)} placeholder="tag1, tag2"/><button className="btn btn-sm btn-primary" style={{marginLeft:8}} onClick={saveTags}>Save</button><button className="btn btn-sm btn-outline" style={{marginLeft:4}} onClick={()=>setTagEntry(null)}>Cancel</button></div>}
      {linkEntry&&<div style={{padding:8,background:'#fef3c7',borderRadius:6,marginBottom:8}}>Link {linkEntry} to: <input className="input" style={{width:300,display:'inline-block',marginBottom:0,marginLeft:8}} value={linkTarget} onChange={e=>setLinkTarget(e.target.value)} placeholder="Target entry ID"/><button className="btn btn-sm btn-primary" style={{marginLeft:8}} onClick={saveLink}>Link</button><button className="btn btn-sm btn-outline" style={{marginLeft:4}} onClick={()=>setLinkEntry(null)}>Cancel</button></div>}
      <table><thead><tr><th>#</th><th style={{cursor:'pointer'}} onClick={()=>toggleSort('source')}>Source{sortIcon('source')}</th><th style={{cursor:'pointer'}} onClick={()=>toggleSort('tier')}>Tier{sortIcon('tier')}</th><th style={{cursor:'pointer'}} onClick={()=>toggleSort('type')}>Type{sortIcon('type')}</th><th style={{cursor:'pointer'}} onClick={()=>toggleSort('created_at')}>Created{sortIcon('created_at')}</th><th>Actions</th></tr></thead><tbody>
      {filtered.map((e,i)=>{const eid=e.id||e.entry_id||'e'+i;return(<tr key={eid}><td>{(page-1)*pageSize+i+1}</td><td>{e.source||e.title||'-'}</td><td><span className="badge badge-blue">{e.tier||e.scope||'-'}</span></td><td>{e.type||e.content_type||'-'}</td><td style={{fontSize:12}}>{e.created_at?new Date(e.created_at).toLocaleString():'-'}</td><td><button className="btn btn-sm btn-outline" onClick={()=>{setTagEntry(eid);setTagInput('');}}>Tags</button>{' '}<button className="btn btn-sm btn-outline" onClick={()=>setLinkEntry(eid)}>Link</button></td></tr>);})}
      {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:'center',color:'#94a3b8'}}>No entries</td></tr>}</tbody></table>
      {totalPages>1&&<div style={{marginTop:12,display:'flex',gap:8,alignItems:'center'}}><button className="btn btn-sm btn-outline" disabled={page<=1} onClick={()=>setPage(p=>p-1)}>Prev</button><span style={{fontSize:12,color:'#64748b'}}>Page {page}/{totalPages}</span><button className="btn btn-sm btn-outline" disabled={page>=totalPages} onClick={()=>setPage(p=>p+1)}>Next</button></div>}</div>}
    {tab==='promotions'&&<div className="card"><h4 style={{marginBottom:12}}>Promotion Queue</h4>{promotions.length===0?<p style={{color:'#94a3b8'}}>No promotions</p>:<table><thead><tr><th>Entry</th><th>From</th><th>To</th><th>Reason</th><th>Requested</th><th>Status</th><th>Actions</th></tr></thead><tbody>{promotions.map(p=>(<tr key={p.id}><td>{p.entryId}</td><td><span className="badge badge-blue">{p.fromTier}</span></td><td><span className="badge badge-purple">{p.toTier}</span></td><td>{p.reason||'-'}</td><td style={{fontSize:12}}>{p.requestedBy}</td><td><span className={'badge '+(p.status==='pending'?'badge-yellow':p.status==='approved'?'badge-green':'badge-red')}>{p.status}</span></td><td>{p.status==='pending'&&<><button className="btn btn-sm btn-success" onClick={()=>reviewPromo(p.id,'approve')}>Approve</button>{' '}<button className="btn btn-sm btn-danger" onClick={()=>reviewPromo(p.id,'reject')}>Reject</button></>}</td></tr>))}</tbody></table>}</div>}

function KBGraphPage({activeTab}={}){
  const mainRef=useRef(null);const miniRef=useRef(null);const rendererRef=useRef(null);
  const[loading,setLoading]=useState(true);const[selectedNode,setSelectedNode]=useState(null);
  const[nodeDetail,setNodeDetail]=useState(null);const[searchTerm,setSearchTerm]=useState('');
  const[graphStats,setGraphStats]=useState(null);
  const[typeFilters,setTypeFilters]=useState({REQUIREMENT:true,ARCHITECTURE:true,PROCEDURE:true,CONTEXT:true,CODE_ENTITY:true,DECISION:true,LESSON_LEARNED:true,ERROR_PATTERN:true,DOCUMENT:true,FUNCTION:true,METHOD:true,CLASS:true,INTERFACE:true,TYPE:true,CONSTRUCTOR:true,ENUM:true,CONSTANT:true,VARIABLE:true});
  const[showFilterDrop,setShowFilterDrop]=useState(false);
  const allNodesRef=useRef([]);
  const colors={REQUIREMENT:'#3b82f6',ARCHITECTURE:'#10b981',PROCEDURE:'#f59e0b',CONTEXT:'#ec4899',CODE_ENTITY:'#ef4444',DECISION:'#06b6d4',LESSON_LEARNED:'#f97316',ERROR_PATTERN:'#dc2626',DOCUMENT:'#a855f7',FUNCTION:'#818cf8',METHOD:'#6366f1',CLASS:'#e879f9',INTERFACE:'#c084fc',TYPE:'#fb7185',CONSTRUCTOR:'#f472b6',ENUM:'#34d399',CONSTANT:'#fbbf24',VARIABLE:'#94a3b8'};
  const basePath=window.__MCP_BASE||'';

  useEffect(()=>{
    if(!mainRef.current)return;
    let destroyed=false;
    setLoading(true);
    // Load all positions
    api('/kb/graph/positions').then(d=>{
      if(destroyed||!d||d.__error)return;
      allNodesRef.current=d.nodes||[];
      setGraphStats({totalNodes:d.total||d.nodes.length,kbNodes:d.kbCount||0,codeNodes:d.codeCount||0,totalEdges:0});
      // Create renderer
      KBGraphRenderer.create(mainRef.current,{minimapCanvas:miniRef.current}).then(r=>{
        if(destroyed){r.destroy();return;}
        rendererRef.current=r;
        r.loadPositions(allNodesRef.current);
        r.zoomToFit();
        // Edges loaded on-demand when zoom close (not on init — too many creates wireframe)
        setLoading(false);
        // Listen for node clicks
        mainRef.current.addEventListener('graph-node-click',function(ev){
          var node=ev.detail;
          setSelectedNode(node);setNodeDetail(null);
          api('/kb/entries/'+node.id).then(function(det){
            if(det&&!det.__error)setNodeDetail(det);
            else setNodeDetail({id:node.id,title:node.label,type:node.type,tier:node.tier,content:'No detail available'});
          });
        });
      });
    }).catch(function(){setLoading(false);});
    return()=>{destroyed=true;if(rendererRef.current){rendererRef.current.destroy();rendererRef.current=null;}};
  },[activeTab]);

  // Auto-reload graph when RBAC changes
  useEffect(()=>{
    const onRbacChanged=()=>{
      api('/kb/graph/positions').then(d=>{
        if(!d||d.__error)return;
        allNodesRef.current=d.nodes||[];
        setGraphStats({totalNodes:d.total||d.nodes.length,kbNodes:d.kbCount||0,codeNodes:d.codeCount||0,totalEdges:0});
        if(rendererRef.current)rendererRef.current.loadPositions(allNodesRef.current);
      });
    };
    window.addEventListener('rbac-changed',onRbacChanged);
    return()=>window.removeEventListener('rbac-changed',onRbacChanged);
  },[]);

  const doSearch=(term)=>{
    setSearchTerm(term);
    if(!term||!rendererRef.current)return;
    var found=allNodesRef.current.find(n=>n.label&&n.label.toLowerCase().includes(term.toLowerCase()));
    if(found){rendererRef.current.focusNode(found.id);setSelectedNode(found);setNodeDetail(null);api('/kb/entries/'+found.id).then(d=>{if(d&&!d.__error)setNodeDetail(d);else setNodeDetail({id:found.id,title:found.label,type:found.type,tier:found.tier,content:'No detail'});});}
  };

  return(<div style={{position:'relative',width:'100%',height:'calc(100vh - 52px)',borderRadius:8,overflow:'hidden',background:'#0f172a'}}>{loading&&<p style={{color:'#94a3b8',padding:24,position:'absolute',zIndex:10}}>Loading {graphStats?graphStats.totalNodes+' nodes':''}...</p>}<div ref={mainRef} style={{width:'100%',height:'100%'}}/><div style={{position:'absolute',top:12,left:12,zIndex:9999,display:'flex',gap:8,alignItems:'center'}}><input className="filter-input" style={{width:180,marginBottom:0,background:'rgba(30,41,59,0.9)',border:'1px solid #475569',color:'#e2e8f0'}} placeholder="Search node..." value={searchTerm} onChange={e=>doSearch(e.target.value)}/><button className="btn btn-sm btn-outline" style={{background:'rgba(30,41,59,0.9)',color:'#e2e8f0',border:'1px solid #475569'}} onClick={()=>{if(rendererRef.current)rendererRef.current.zoomToFit();}}>Fit</button><div style={{position:'relative'}}><button className="btn btn-sm btn-outline" style={{background:'rgba(30,41,59,0.9)',color:'#e2e8f0',border:'1px solid #475569'}} onClick={()=>setShowFilterDrop(!showFilterDrop)}>Filter {showFilterDrop?'\u25B4':'\u25BE'}</button>{showFilterDrop&&<div style={{position:'absolute',top:32,left:0,zIndex:9999,background:'rgba(30,41,59,0.95)',border:'1px solid #475569',borderRadius:6,padding:8,boxShadow:'0 4px 12px rgba(0,0,0,0.3)',minWidth:150}}>{Object.entries(typeFilters).map(([type,on])=>(<label key={type} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',fontSize:12,cursor:'pointer',color:'#e2e8f0'}}><input type="checkbox" checked={on} onChange={e=>{const nf={...typeFilters,[type]:e.target.checked};setTypeFilters(nf);if(rendererRef.current){var filtered=allNodesRef.current.filter(n=>nf[n.type]!==false);rendererRef.current.loadPositions(filtered);}}}/><span style={{width:8,height:8,borderRadius:'50%',background:colors[type]||'#64748b',display:'inline-block'}}/><span style={{textTransform:'capitalize'}}>{type}</span></label>))}</div>}</div>{graphStats&&<span style={{fontSize:11,color:'#94a3b8',background:'rgba(30,41,59,0.9)',padding:'4px 8px',borderRadius:4}}>{(graphStats.totalNodes||0).toLocaleString()} nodes ({(graphStats.kbNodes||0).toLocaleString()} KB + {(graphStats.codeNodes||0).toLocaleString()} Code)</span>}</div><canvas ref={miniRef} width={180} height={140} style={{position:'absolute',bottom:12,right:12,zIndex:9999,borderRadius:6,border:'1px solid #334155',cursor:'grab',background:'#1e293b'}}/>{selectedNode&&<div style={{position:'absolute',top:12,right:12,zIndex:9999,width:300,maxHeight:'70%',overflow:'auto',background:'rgba(30,41,59,0.95)',border:'1px solid #334155',borderRadius:8,padding:14,boxShadow:'0 4px 20px rgba(0,0,0,0.5)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><strong style={{color:'#e2e8f0',fontSize:13}}>{selectedNode.label||selectedNode.id}</strong><span style={{cursor:'pointer',color:'#94a3b8',fontSize:16}} onClick={()=>setSelectedNode(null)}>&times;</span></div><div style={{fontSize:11,color:'#94a3b8',marginBottom:6}}><span className='badge badge-blue' style={{marginRight:6}}>{selectedNode.type}</span><span className='badge badge-purple'>{selectedNode.tier||'SHARED'}</span></div>{nodeDetail?<div style={{fontSize:12,color:'#cbd5e1'}}>{nodeDetail.content&&<div className="md-content" style={{marginBottom:8,lineHeight:1.6,maxHeight:200,overflow:'auto',fontSize:12}} dangerouslySetInnerHTML={{__html:typeof marked!=='undefined'?marked.parse(nodeDetail.content.substring(0,800)):nodeDetail.content.substring(0,300)}}/>}{nodeDetail.tags&&nodeDetail.tags.length>0&&<div style={{marginBottom:6}}><span style={{color:'#94a3b8'}}>Tags:</span> {nodeDetail.tags.join(', ')}</div>}{nodeDetail.links&&nodeDetail.links.length>0&&<div style={{marginBottom:6}}><span style={{color:'#94a3b8'}}>Links:</span> {nodeDetail.links.length} connections</div>}{nodeDetail.qualityScore!=null&&<div><span style={{color:'#94a3b8'}}>Quality:</span> {(nodeDetail.qualityScore*100).toFixed(0)}%</div>}{nodeDetail.createdAt&&<div style={{marginTop:6,fontSize:10,color:'#64748b'}}>Created: {new Date(nodeDetail.createdAt).toLocaleString()}</div>}</div>:<p style={{fontSize:11,color:'#64748b'}}>Loading...</p>}</div>}<div style={{position:'absolute',bottom:12,left:12,zIndex:9999,background:'rgba(30,41,59,0.92)',border:'1px solid #334155',borderRadius:8,padding:'8px 12px'}}><div style={{fontSize:10,fontWeight:600,color:'#e2e8f0',marginBottom:4}}>Node Types</div>{Object.entries(colors).map(([type,color])=>(<div key={type} style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}><span style={{width:8,height:8,borderRadius:'50%',background:color,display:'inline-block'}}/><span style={{fontSize:10,color:'#cbd5e1',textTransform:'capitalize'}}>{type}</span></div>))}</div></div>);}
function AnalyticsPage(){const[data,setData]=useState(null);const[loading,setLoading]=useState(true);

    <div className="card"><h3 style={{marginBottom:12}}>Embedding Space (2D Scatter)</h3><svg width="100%" viewBox="0 0 600 300" style={{display:'block',background:'#fafbfc',borderRadius:8}}>{(embeddingSpace||[]).map((d,i)=>{const colors=['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899'];return(<circle key={i} cx={40+d.x*520} cy={10+d.y*260} r={5} fill={colors[d.cluster%5]} opacity={0.7}><title>{d.label} ({d.type})</title></circle>);})}<text x="300" y="295" textAnchor="middle" fontSize="10" fill="#94a3b8">2D Embedding Projection</text></svg><div style={{marginTop:8,display:'flex',gap:12,fontSize:11,color:'#64748b'}}><span style={{color:'#3b82f6'}}>● document</span><span style={{color:'#22c55e'}}>● code</span><span style={{color:'#f59e0b'}}>● config</span><span style={{color:'#8b5cf6'}}>● api</span><span style={{color:'#ec4899'}}>● module</span></div></div>
  </div>);}


function KBQualityPage(){const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[page,setPage]=useState(1);const[tierFilter,setTierFilter]=useState('');const[sortBy,setSortBy]=useState('quality_score');const[sortDir,setSortDir]=useState('desc');
  const load=(p,tier,sb,sd)=>{const params='?page='+p+'&pageSize=20&sortBy='+sb+'&sortDir='+sd+(tier?'&tier='+tier:'');api('/kb/quality'+params).then(d=>{if(d&&!d.__error)setData(d);setLoading(false);});};
  useEffect(()=>{load(page,tierFilter,sortBy,sortDir);},[page,tierFilter,sortBy,sortDir]);
  const toggleSort=(col)=>{if(sortBy===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortBy(col);setSortDir('desc');}setPage(1);};
  const sortIcon=(col)=>sortBy===col?(sortDir==='asc'?' \u25B2':' \u25BC'):'';
  if(loading)return<div><div className="header"><h2>KB Quality</h2></div><p style={{color:'#64748b'}}>Loading...</p></div>;
  if(!data)return<div><div className="header"><h2>KB Quality</h2></div><p>No data</p></div>;
  const{entries,total,totalPages,distribution,summary}=data;
  const maxD=Math.max(...(distribution||[]).map(d=>d.count),1);
  const statusColor=(s)=>s==='good'?'badge-green':s==='fair'?'badge-yellow':'badge-red';
  return(<div><div className="header"><h2>KB Quality</h2><span className="badge badge-blue" style={{fontSize:14,padding:'4px 12px'}}>{total} entries</span></div>
    <div className="grid"><div className="card"><h3>Average Score</h3><div className="value">{((summary?.avgScore||0)*100).toFixed(0)}%</div></div><div className="card"><h3>Good (&ge;70%)</h3><div className="value" style={{color:'#166534'}}>{summary?.good||0}</div></div><div className="card"><h3>Fair (40-70%)</h3><div className="value" style={{color:'#92400e'}}>{summary?.fair||0}</div></div><div className="card"><h3>Poor (&lt;40%)</h3><div className="value" style={{color:'#991b1b'}}>{summary?.poor||0}</div></div></div>
    <div className="card" style={{marginTop:16}}><h3 style={{marginBottom:12}}>Quality Distribution</h3><svg width="100%" viewBox="0 0 600 160" style={{display:'block'}}>{(distribution||[]).map((d,i)=>{const barH=(d.count/maxD)*110;return(<g key={i}><rect x={50+i*52} y={130-barH} width={44} height={barH} fill={i<4?'#ef4444':i<7?'#f59e0b':'#22c55e'} rx={3} opacity={0.8}/><text x={50+i*52+22} y={148} textAnchor="middle" fontSize="9" fill="#64748b">{d.range}</text><text x={50+i*52+22} y={125-barH} textAnchor="middle" fontSize="9" fill="#475569">{d.count}</text></g>);})}</svg></div>
    <div className="card" style={{marginTop:16}}><div className="toolbar"><select className="filter-input" style={{width:140}} value={tierFilter} onChange={e=>{setTierFilter(e.target.value);setPage(1);}}><option value="">All Tiers</option><option value="USER">USER</option><option value="PROJECT">PROJECT</option><option value="SHARED">SHARED</option></select></div>
    <table><thead><tr><th>#</th><th style={{cursor:'pointer'}} onClick={()=>toggleSort('source')}>Entry{sortIcon('source')}</th><th>Type</th><th style={{cursor:'pointer'}} onClick={()=>toggleSort('tier')}>Tier{sortIcon('tier')}</th><th style={{cursor:'pointer'}} onClick={()=>toggleSort('quality_score')}>Quality Score{sortIcon('quality_score')}</th><th>Status</th></tr></thead><tbody>
    {(entries||[]).map((e,i)=>(<tr key={e.id||i}><td>{(page-1)*20+i+1}</td><td>{e.source||'-'}</td><td style={{fontSize:12,color:'#64748b'}}>{e.type||'-'}</td><td><span className="badge badge-blue">{e.tier}</span></td><td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="score-bar" style={{width:80}}><div className="score-fill" style={{width:(e.qualityScore*100)+'%',background:e.qualityScore>=0.7?'#22c55e':e.qualityScore>=0.4?'#f59e0b':'#ef4444'}}/></div><span style={{fontSize:12}}>{(e.qualityScore*100).toFixed(0)}%</span></div></td><td><span className={'badge '+statusColor(e.status)}>{e.status}</span></td></tr>))}
    {(!entries||entries.length===0)&&<tr><td colSpan={6} style={{textAlign:'center',color:'#94a3b8'}}>No entries</td></tr>}</tbody></table>
    {totalPages>1&&<div style={{marginTop:12,display:'flex',gap:8,alignItems:'center'}}><button className="btn btn-sm btn-outline" disabled={page<=1} onClick={()=>setPage(p=>p-1)}>Prev</button><span style={{fontSize:12,color:'#64748b'}}>Page {page}/{totalPages}</span><button className="btn btn-sm btn-outline" disabled={page>=totalPages} onClick={()=>setPage(p=>p+1)}>Next</button></div>}</div></div>);}

function KBTagsPage(){const[tags,setTags]=useState([]);const[loading,setLoading]=useState(true);const[newTag,setNewTag]=useState('');const[msg,setMsg]=useState('');const[renameTag,setRenameTag]=useState(null);const[renameTo,setRenameTo]=useState('');const[mergeSource,setMergeSource]=useState('');const[mergeTarget,setMergeTarget]=useState('');const[showMerge,setShowMerge]=useState(false);const[selectedTag,setSelectedTag]=useState(null);const[tagEntries,setTagEntries]=useState([]);

  useEffect(()=>{load();},[]);
  const createTag=()=>{if(!newTag.trim())return;api('/kb/tags',{method:'POST',body:JSON.stringify({name:newTag.trim()})}).then(d=>{if(d&&!d.__error){setMsg('Tag created');setNewTag('');load();}else setMsg(d?.error||'Failed');});};
  const deleteTag=(name)=>{if(!confirm('Delete tag "'+name+'"?'))return;api('/kb/tags/'+encodeURIComponent(name),{method:'DELETE'}).then(d=>{if(d&&!d.__error){setMsg('Tag deleted');load();}});};
  const doRename=()=>{if(!renameTag||!renameTo.trim())return;api('/kb/tags/'+encodeURIComponent(renameTag),{method:'PUT',body:JSON.stringify({name:renameTo.trim()})}).then(d=>{if(d&&!d.__error){setMsg('Renamed ('+d.entriesAffected+' entries)');setRenameTag(null);setRenameTo('');load();}});};
  const doMerge=()=>{if(!mergeSource||!mergeTarget)return;api('/kb/tags/merge',{method:'POST',body:JSON.stringify({sourceTag:mergeSource,targetTag:mergeTarget})}).then(d=>{if(d&&!d.__error){setMsg('Merged ('+d.entriesAffected+' entries)');setShowMerge(false);setMergeSource('');setMergeTarget('');load();}else setMsg(d?.error||'Failed');});};
  const viewEntries=(name)=>{setSelectedTag(name);api('/kb/tags/'+encodeURIComponent(name)+'/entries').then(d=>{if(d&&!d.__error)setTagEntries(d.entries||[]);});};
  if(loading)return<div><div className="header"><h2>KB Tags</h2></div><p style={{color:'#64748b'}}>Loading...</p></div>;
  return(<div><div className="header"><h2>KB Tags</h2><span className="badge badge-blue" style={{fontSize:14,padding:'4px 12px'}}>{tags.length} tags</span></div>
    {msg&&<div style={{position:'fixed',bottom:20,right:20,zIndex:9999,background:msg.startsWith('✗')||msg.startsWith('Failed')?'#fef2f2':'#f0fdf4',border:msg.startsWith('✗')||msg.startsWith('Failed')?'1px solid #fca5a5':'1px solid #86efac',padding:'12px 20px',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,0.15)',maxWidth:400,fontSize:13,display:'flex',alignItems:'center',gap:8}}><span>{msg}</span><button className="btn btn-sm btn-outline" style={{marginLeft:8,padding:'2px 6px'}} onClick={()=>setMsg('')}>✕</button></div>}

function UsersPage(){const[users,setUsers]=useState([]);const[filter,setFilter]=useState('');const[showCreate,setShowCreate]=useState(false);const[groups,setGroups]=useState([]);const[msg,setMsg]=useState('');const[page,setPage]=useState(1);const[total,setTotal]=useState(0);const pageSize=50;

function PortalInstance({permissions,username,isActive,impersonateUserId}){

}

function App(){const[loggedIn,setLoggedIn]=useState(!!localStorage.getItem('admin_token'));const[forceChange,setForceChange]=useState(false);const[cpwd,setCpwd]=useState({c:'',n1:'',n2:'',err:''});

  const addTab=(u)=>{api('/impersonate/'+u.userId).then(d=>{if(d&&!d.__error){setTabs(t=>[...t,{id:'tab-'+Date.now(),userId:d.userId,username:d.username,permissions:d.permissions}]);setShowAddTab(false);}});};
  const removeTab=(tabId)=>{setTabs(t=>t.filter(x=>x.id!==tabId));if(activeTab===tabId)setActiveTab('admin');};
  const switchTab=(id)=>{setActiveTab(id);const tab=tabs.find(t=>t.id===id);__impersonateUserId=tab?tab.userId:null;};
  return(<div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
    <div style={{display:'flex',background:'#1e293b',alignItems:'center',padding:'0 12px',flexShrink:0,minHeight:38}}>
      <div onClick={()=>switchTab('admin')} style={{padding:'8px 16px',fontSize:13,cursor:'pointer',color:activeTab==='admin'?'#fff':'#94a3b8',background:activeTab==='admin'?'#334155':'transparent',borderRadius:'6px 6px 0 0',fontWeight:activeTab==='admin'?600:400}}>Admin ({realPerms.length})</div>
      {tabs.map(t=>(<div key={t.id} style={{display:'flex',alignItems:'center',gap:4,padding:'8px 12px',fontSize:13,cursor:'pointer',color:activeTab===t.id?'#fff':'#94a3b8',background:activeTab===t.id?'#334155':'transparent',borderRadius:'6px 6px 0 0'}} onClick={()=>switchTab(t.id)}><span style={{fontWeight:activeTab===t.id?600:400}}>{t.username}</span><span style={{fontSize:10,color:'#64748b'}}>({t.permissions.length})</span><span style={{marginLeft:4,fontSize:14,color:'#64748b'}} onClick={e=>{e.stopPropagation();removeTab(t.id);}}>&times;</span></div>))}
      <div style={{position:'relative',marginLeft:8}}><button style={{background:'#475569',color:'#e2e8f0',border:'none',borderRadius:4,padding:'4px 10px',fontSize:12,cursor:'pointer'}} onClick={()=>setShowAddTab(!showAddTab)}>+</button>{showAddTab&&<div style={{position:'fixed',top:36,zIndex:99999,background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,padding:6,maxHeight:300,overflow:'auto',width:220,boxShadow:'0 8px 24px rgba(0,0,0,0.15)'}}>{usersList.filter(u=>!tabs.some(t=>t.userId===u.userId)&&u.userId!==userInfo.userId).map(u=>(<div key={u.userId} style={{padding:'6px 10px',fontSize:13,color:'#1e293b',cursor:'pointer',borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.background='#f0f9ff'} onMouseLeave={e=>e.currentTarget.style.background='transparent'} onClick={()=>addTab(u)}>{u.username} <span style={{color:'#64748b',fontSize:11}}>({u.accessGroupName||''})</span></div>))}{usersList.filter(u=>!tabs.some(t=>t.userId===u.userId)&&u.userId!==userInfo.userId).length===0&&<div style={{fontSize:12,color:'#64748b',padding:8}}>No users</div>}</div>}</div>
      <div style={{marginLeft:'auto',padding:'0 12px'}}><span style={{fontSize:11,color:'#64748b'}} onClick={logout} style={{cursor:'pointer',fontSize:11,color:'#94a3b8'}}>Logout</span></div>
    </div>
    <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative'}}>
      <PortalInstance permissions={realPerms} username={userInfo.username||'admin'} isActive={activeTab==='admin'} impersonateUserId={null}/>
      {tabs.map(t=>(<PortalInstance key={t.id} permissions={t.permissions} username={t.username} isActive={activeTab===t.id} impersonateUserId={t.userId}/>))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

// Disable Babel script tag processing for any future scripts
if(window.Babel&&window.Babel.transformScriptTags){window.Babel.transformScriptTags=function(){};}
if(window.Babel&&window.Babel.transform){var origTransform=window.Babel.transform;window.Babel.transform=function(code,opts){if(code&&code.indexOf&&code.indexOf('import ')===0)return{code:''};return origTransform.call(this,code,opts);};}
